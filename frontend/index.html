<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Raju AI</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body>

<!-- Animated background particles -->
<canvas id="particles"></canvas>

<!-- Glow orbs -->
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo">
      <div class="avatar">
        <span class="avatar-letter">R</span>
        <div class="avatar-ring"></div>
        <div class="avatar-pulse"></div>
      </div>
      <div class="logo-text">
        <h1>Raju</h1>
        <span>AI Assistant</span>
      </div>
    </div>

    <div class="sidebar-info">
      <div class="status-dot"></div>
      <p>Online & Ready</p>
    </div>

    <div class="divider"></div>

    <div class="tips">
      <div class="tip-item">
        <span class="tip-icon">💡</span>
        <p>Ask me anything!</p>
      </div>
      <div class="tip-item">
        <span class="tip-icon">📝</span>
        <p>I can write, explain, code...</p>
      </div>
      <div class="tip-item">
        <span class="tip-icon">😄</span>
        <p>I even crack jokes!</p>
      </div>
    </div>

    <div class="sidebar-footer">
      <div class="model-badge">
        <span class="model-dot"></span>
        LLaMA 3.3 · Groq
      </div>
    </div>
  </aside>

  <!-- Main Chat -->
  <main class="chat-area">
    <div class="chat-header">
      <div class="header-left">
        <div class="header-avatar">R</div>
        <div>
          <span class="header-name">Raju</span>
          <span class="header-status">● Active now</span>
        </div>
      </div>
      <div class="header-right">
        <div class="signal-bars">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>

    <div class="chat-messages" id="chat">
      <div class="message bot-message" style="animation-delay: 0.2s">
        <div class="bot-icon">R</div>
        <div class="bubble">
          👋 Hey there! I'm <strong>Raju</strong>, your AI assistant. What can I help you with today?
        </div>
      </div>
    </div>

    <div class="chat-input-area">
      <div class="input-wrapper">
        <input
          id="input"
          type="text"
          placeholder="Ask Raju something..."
          onkeydown="if(event.key==='Enter') sendMessage()"
          autocomplete="off"
        />
        <div class="input-glow"></div>
      </div>
      <button onclick="sendMessage()" id="send-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M22 2L11 13" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </main>

</div>

<script src="script.js"></script>

<script>
// ── Particle canvas ──
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let W, H, particles = [];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

function Particle() {
  this.x = Math.random() * W;
  this.y = Math.random() * H;
  this.r = Math.random() * 1.5 + 0.3;
  this.speedX = (Math.random() - 0.5) * 0.3;
  this.speedY = (Math.random() - 0.5) * 0.3;
  this.alpha = Math.random() * 0.5 + 0.1;
  this.color = Math.random() > 0.5 ? '240,192,64' : '224,108,48';
}

for (let i = 0; i < 80; i++) particles.push(new Particle());

function drawParticles() {
  ctx.clearRect(0, 0, W, H);
  particles.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${p.color},${p.alpha})`;
    ctx.fill();
    p.x += p.speedX;
    p.y += p.speedY;
    if (p.x < 0 || p.x > W) p.speedX *= -1;
    if (p.y < 0 || p.y > H) p.speedY *= -1;
  });

  // Draw connecting lines
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 100) {
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.strokeStyle = `rgba(240,192,64,${0.08 * (1 - dist/100)})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }
  }
  requestAnimationFrame(drawParticles);
}
drawParticles();
</script>

</body>
</html>
